<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱豆实时聊天</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f5f5f5;
            padding: 20px;
        }
        .chat-box {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .messages {
            height: 500px;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg {
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 70%;
        }
        .user {
            background: #007bff;
            color: white;
            align-self: flex-end;
        }
        .ai {
            background: #e9e9eb;
            align-self: flex-start;
        }
        .input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #eee;
        }
        #input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
        }
        #send {
            margin-left: 10px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="chat-box">
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="input" placeholder="输入消息...">
            <button id="send">→</button>
        </div>
    </div>

    <script>
        const messages = document.getElementById('messages');
        const input = document.getElementById('input');
        const send = document.getElementById('send');

        // 在这里填入你的 OpenAI API Key
        const API_KEY = "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";

        async function getAIReply(text) {
            try {
                const res = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + API_KEY
                    },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [
                            {
                                role: "user",
                                content: text
                            }
                        ]
                    })
                });
                const data = await res.json();
                return data.choices[0].message.content;
            } catch (e) {
                return "连接失败，请检查 API Key";
            }
        }

        function addMsg(text, isUser) {
            const div = document.createElement('div');
            div.className = "msg " + (isUser ? "user" : "ai");
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        async function sendMsg() {
            const text = input.value.trim();
            if (!text) return;
            addMsg(text, true);
            input.value = "";

            const reply = await getAIReply(text);
            addMsg(reply, false);
        }

        send.addEventListener('click', sendMsg);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMsg();
        });
    </script>
</body>
</html>
